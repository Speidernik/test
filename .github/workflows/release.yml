name: 🚀 Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # v1.2.3-beta.1
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.4'
  JAVA_VERSION: '17'

# ── Job 1: Test ────────────────────────────────────────────────────────────────
jobs:
  test:
    name: 🧪 Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

# ── Job 2: Build APK ───────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: flutter pub get

      # ── Version metadata ──────────────────────────────────────────────────
      - name: Extract version metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '[:space:]')
          VERSION=$(echo "$PUBSPEC_VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=${{ github.run_number }}

          echo "tag=$TAG"                   >> $GITHUB_OUTPUT
          echo "version=$VERSION"           >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

          echo "🏷️  Tag:          $TAG"
          echo "📦  Version:      $VERSION"
          echo "🔢  Build number: $BUILD_NUMBER"

      # ── Signing ───────────────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --build-name="${{ steps.meta.outputs.version }}" \
            --build-number="${{ steps.meta.outputs.build_number }}"

      # ── Stage & checksum ──────────────────────────────────────────────────
      - name: Stage artifact
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/warehouse-pro-${TAG}.apk"
          cd dist
          sha256sum "warehouse-pro-${TAG}.apk" > SHA256SUMS.txt
          echo "✅ APK: $(du -sh warehouse-pro-${TAG}.apk | cut -f1)"
          cat SHA256SUMS.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.meta.outputs.tag }}
          path: dist/
          retention-days: 30

# ── Job 3: Release ────────────────────────────────────────────────────────────
  release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-${{ needs.build.outputs.tag }}
          path: dist/

      - name: Generate release body
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          BUILD="${{ needs.build.outputs.build_number }}"

          cat > release_body.md << MARKDOWN
          ## 🏭 Warehouse Pro v${VERSION} (build ${BUILD})

          ### 📥 Installation

          1. Download \`warehouse-pro-v${VERSION}.apk\` below
          2. Transfer to your Zebra device via USB or MDM
          3. Enable **Install from unknown sources** in device settings
          4. Install the APK

          ### 🔍 Integrity
          Verify the download with \`SHA256SUMS.txt\`.

          ### 🔫 DataWedge Scanner Setup
          Create a DataWedge profile for \`com.example.starter_app\`:
          - **Intent output** → enabled
          - **Intent action**: \`com.starter_app.ACTION_SCAN\`
          - **Intent delivery**: Broadcast intent

          ---
          MARKDOWN

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "🏭 Warehouse Pro v${{ needs.build.outputs.version }}"
          body_path: release_body.md
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
